<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Tasks"/>
<meta name="theme-color" content="#0f0f13"/>
<title>My Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0f0f13;
  --surface:#18181f;
  --surface2:#22222d;
  --surface3:#2a2a38;
  --accent:#7c6ff7;
  --accent2:#a78bfa;
  --green:#34d399;
  --amber:#fbbf24;
  --red:#f87171;
  --text:#f0eeff;
  --text2:#9492b8;
  --text3:#5c5a7a;
  --border:rgba(124,111,247,0.15);
  --border2:rgba(124,111,247,0.28);
  --radius:16px;
  --radius-sm:10px;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;overflow-x:hidden}
body{display:flex;flex-direction:column;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

/* HEADER */
.header{padding:52px 20px 16px;background:linear-gradient(180deg,rgba(124,111,247,.08) 0%,transparent 100%);border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.app-title{font-size:26px;font-weight:600;letter-spacing:-.5px;color:var(--text)}
.header-date{font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
.progress-wrap{display:flex;align-items:center;gap:10px}
.progress-bar{flex:1;height:4px;border-radius:20px;background:var(--surface3);overflow:hidden}
.progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s cubic-bezier(.4,0,.2,1)}
.progress-label{font-size:12px;color:var(--accent2);font-family:var(--mono);min-width:32px;text-align:right}

/* STATS ROW */
.stats{display:flex;gap:10px;padding:14px 20px}
.stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.stat-num{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono)}

/* TABS */
.tabs{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:var(--font);cursor:pointer;transition:all .15s}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}

/* NOTIF BANNER */
.notif{display:none;margin:0 20px 12px;padding:12px 14px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:var(--radius-sm);font-size:13px;color:var(--green);align-items:center;gap:10px;animation:slideIn .3s ease}
.notif.show{display:flex}
.notif-dismiss{margin-left:auto;background:none;border:none;color:var(--green);font-size:18px;cursor:pointer;line-height:1}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* TASK LIST */
.list-wrap{flex:1;overflow-y:auto;padding:0 20px 100px}
.section-label{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.task{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;transition:all .2s;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.task.done{opacity:.45}
.task.done .task-title{text-decoration:line-through;color:var(--text3)}

.check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check.checked{background:var(--green);border-color:var(--green)}
.check svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none}
.check.checked svg{display:block}

.task-body{flex:1;min-width:0}
.task-title{font-size:15px;font-weight:500;color:var(--text);line-height:1.4;word-break:break-word}
.task-notes{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.5}
.task-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;align-items:center}
.pill{font-size:11px;padding:3px 8px;border-radius:20px;font-family:var(--mono)}
.pill-daily{background:rgba(124,111,247,.15);color:var(--accent2)}
.pill-long{background:rgba(251,191,36,.1);color:var(--amber)}
.pill-high{background:rgba(248,113,113,.12);color:var(--red)}
.pill-med{background:rgba(251,191,36,.1);color:var(--amber)}
.pill-low{background:rgba(52,211,153,.1);color:var(--green)}
.pill-time{background:transparent;color:var(--text3);font-size:11px;display:flex;align-items:center;gap:3px}
.pill-time svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.pill-time.fired{color:var(--green)}
.done-time{font-size:11px;color:var(--text3);font-family:var(--mono)}

.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;flex-shrink:0;margin-top:-2px;opacity:0.6;transition:opacity .15s}
.del-btn:hover{opacity:1}
.del-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}

.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.empty svg{width:36px;height:36px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;margin:0 auto 12px;display:block}

/* FAB */
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(124,111,247,.45);transition:transform .15s,box-shadow .15s;z-index:100}
.fab:active{transform:scale(.93)}
.fab svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}

/* BOTTOM SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(4px)}
.overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:20px;background:var(--surface3);margin:12px auto 0}
.sheet-title{font-size:17px;font-weight:600;padding:16px 20px 8px;color:var(--text)}
.sheet-body{padding:8px 20px 20px;display:flex;flex-direction:column;gap:14px}
.field label{display:block;font-size:12px;color:var(--text2);font-family:var(--mono);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:15px;padding:12px 14px;outline:none;transition:border .15s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent2)}
.field textarea{resize:none;line-height:1.5}
.field input[type=datetime-local]{color-scheme:dark}
.field select option{background:var(--surface2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-add{width:100%;padding:15px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;font-family:var(--font);cursor:pointer;margin-top:4px;transition:opacity .15s}
.btn-add:active{opacity:.8}

/* INSTALL BANNER */
.install-banner{display:none;margin:0 20px 12px;padding:12px 14px;background:rgba(124,111,247,.1);border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;color:var(--accent2);align-items:flex-start;gap:10px}
.install-banner.show{display:flex}
.install-banner svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;margin-top:1px}
.install-text{flex:1;line-height:1.5}
.install-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;margin-left:4px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">My Tasks</div>
    <div style="font-size:22px">📋</div>
  </div>
  <div class="header-date" id="date-label"></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-label" id="prog-pct">0%</div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">total</div></div>
  <div class="stat"><div class="stat-num" id="s-done" style="color:var(--green)">0</div><div class="stat-lbl">done</div></div>
  <div class="stat"><div class="stat-num" id="s-pending" style="color:var(--amber)">0</div><div class="stat-lbl">pending</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('all',this)">All</button>
  <button class="tab" onclick="setTab('daily',this)">Daily</button>
  <button class="tab" onclick="setTab('long',this)">Long-term</button>
  <button class="tab" onclick="setTab('pending',this)">Pending</button>
  <button class="tab" onclick="setTab('done',this)">Done ✅</button>
</div>

<div class="install-banner" id="install-banner">
  <svg viewBox="0 0 24 24"><path d="M12 2v13m-5-5 5 5 5-5M5 20h14"/></svg>
  <div class="install-text"><b>Install as app:</b> Tap the Share button in your browser → "Add to Home Screen" to use this like a real app!</div>
  <button class="install-close" onclick="document.getElementById('install-banner').classList.remove('show')">×</button>
</div>

<div class="notif" id="notif-banner">
  <span>🔔</span>
  <span id="notif-text"></span>
  <button class="notif-dismiss" onclick="dismissNotif()">×</button>
</div>

<div class="list-wrap" id="task-list"></div>

<button class="fab" onclick="openSheet()" aria-label="Add task">
  <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">New Task</div>
  <div class="sheet-body">
    <div class="field">
      <label>Task title *</label>
      <input id="f-title" type="text" placeholder="What do you need to do?" />
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="f-notes" rows="2" placeholder="Add details…"></textarea>
    </div>
    <div class="row2">
      <div class="field">
        <label>Type</label>
        <select id="f-type">
          <option value="daily">Daily task</option>
          <option value="long">Long-term goal</option>
        </select>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="f-priority">
          <option value="high">🔴 High</option>
          <option value="med" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>⏰ Reminder date &amp; time</label>
      <input id="f-reminder" type="datetime-local" />
    </div>
    <button class="btn-add" onclick="addTask()">Add Task</button>
  </div>
</div>

<script>
let tasks=[];
let currentTab='all';
let notifTO=null;

function init(){
  const s=localStorage.getItem('sahil_mytasks_v2');
  if(s){try{tasks=JSON.parse(s)}catch(e){tasks=[]}}
  setDateLabel();
  render();
  setInterval(checkReminders,20000);
  checkReminders();
  setTimeout(()=>{
    if(!localStorage.getItem('install_shown')){
      document.getElementById('install-banner').classList.add('show');
      localStorage.setItem('install_shown','1');
    }
  },2000);
}

function setDateLabel(){
  const d=new Date();
  document.getElementById('date-label').textContent=d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function save(){try{localStorage.setItem('sahil_mytasks_v2',JSON.stringify(tasks))}catch(e){}}

function openSheet(){
  const now=new Date();
  now.setMinutes(now.getMinutes()-now.getTimezoneOffset()+30);
  now.setSeconds(0,0);
  document.getElementById('f-reminder').value=now.toISOString().slice(0,16);
  document.getElementById('f-title').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('sheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),350);
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function addTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  tasks.unshift({
    id:Date.now(),
    title,
    notes:document.getElementById('f-notes').value.trim(),
    type:document.getElementById('f-type').value,
    priority:document.getElementById('f-priority').value,
    reminder:document.getElementById('f-reminder').value,
    done:false,doneAt:null,notified:false,
    createdAt:new Date().toISOString()
  });
  save();closeSheet();render();
}

function toggleTask(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  t.done=!t.done;
  t.doneAt=t.done?new Date().toISOString():null;
  save();render();
}

function removeTask(id){
  if(!confirm('Delete this task?'))return;
  tasks=tasks.filter(x=>x.id!==id);
  save();render();
}

function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filtered(){
  if(currentTab==='daily')return tasks.filter(t=>t.type==='daily');
  if(currentTab==='long')return tasks.filter(t=>t.type==='long');
  if(currentTab==='pending')return tasks.filter(t=>!t.done);
  if(currentTab==='done')return tasks.filter(t=>t.done);
  return tasks;
}

function fmtDT(dt){
  if(!dt)return'';
  return new Date(dt).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:true});
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function taskHTML(t){
  const pMap={high:'pill-high',med:'pill-med',low:'pill-low'};
  const pLabel={high:'High',med:'Medium',low:'Low'};
  const reminderHTML=t.reminder?`<span class="pill pill-time ${t.notified?'fired':''}">
    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    ${fmtDT(t.reminder)}${t.notified?' ✓':''}
  </span>`:'';
  const doneHTML=t.done&&t.doneAt?`<span class="done-time">✅ ${fmtDT(t.doneAt)}</span>`:'';
  const notesHTML=t.notes?`<div class="task-notes">${esc(t.notes)}</div>`:'';
  return`<div class="task ${t.done?'done':''}" id="tc-${t.id}">
    <button class="check ${t.done?'checked':''}" onclick="toggleTask(${t.id})" aria-label="Toggle done">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      ${notesHTML}
      <div class="task-meta">
        <span class="pill ${t.type==='daily'?'pill-daily':'pill-long'}">${t.type==='daily'?'Daily':'Long-term'}</span>
        <span class="pill ${pMap[t.priority]}">${pLabel[t.priority]}</span>
        ${reminderHTML}${doneHTML}
      </div>
    </div>
    <button class="del-btn" onclick="removeTask(${t.id})" aria-label="Delete">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </button>
  </div>`;
}

function render(){
  const list=filtered();
  const total=tasks.length,done=tasks.filter(t=>t.done).length,pending=total-done;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-pending').textContent=pending;
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  const daily=list.filter(t=>t.type==='daily');
  const longT=list.filter(t=>t.type==='long');
  const container=document.getElementById('task-list');

  if(list.length===0){
    container.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>No tasks here yet<br><span style="font-size:12px;margin-top:6px;display:block">Tap + to add one</span></div>`;
    return;
  }

  let html='';
  if(daily.length>0){
    html+=`<div class="section-label">Daily Tasks</div>`;
    daily.forEach(t=>{ html+=taskHTML(t); });
  }
  if(longT.length>0){
    html+=`<div class="section-label">Long-term Goals</div>`;
    longT.forEach(t=>{ html+=taskHTML(t); });
  }
  container.innerHTML=html;
}

function checkReminders(){
  const now=new Date();
  let fired=false;
  tasks.forEach(t=>{
    if(!t.done&&t.reminder&&!t.notified){
      if(now>=new Date(t.reminder)){
        t.notified=true;fired=true;
        showNotif('⏰ Reminder: "'+t.title+'" — time to do it!');
        if(window.Notification&&Notification.permission==='granted'){
          new Notification('Task Reminder 🔔',{body:t.title});
        }
      }
    }
  });
  if(fired){save();render();}
}

function showNotif(msg){
  const b=document.getElementById('notif-banner');
  document.getElementById('notif-text').textContent=msg;
  b.classList.add('show');
  if(notifTO)clearTimeout(notifTO);
  notifTO=setTimeout(dismissNotif,9000);
}

function dismissNotif(){
  document.getElementById('notif-banner').classList.remove('show');
}

if(window.Notification&&Notification.permission==='default'){
  Notification.requestPermission();
}

init();
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('Service Worker Registered'));
}
</script>
</body>
</html>
